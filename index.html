<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小柯 · 桌面陪伴 v6</title>
<style>
  :root{
    --ink:#4a3728;
    --pink:#ff8a9a;
    --blue:#6aafe6;
    --gold:#f0c040;
    --shadow:0 8px 24px rgba(60,40,20,.22);
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; height:100%; font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:transparent; overflow:hidden;}
  body{display:flex; align-items:flex-start; justify-content:center;}
  #stage{position:relative; width:100%; height:100%; transform-origin:50% 0;}

  /* 人物（内联 SVG，透明背景，只显示角色本身） */
  #petSvg{position:absolute; left:50%; top:34px; transform:translateX(-50%);
    width:150px; height:180px; cursor:grab; transition:top .3s ease, width .3s ease, height .3s ease;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.18));}
  #petSvg:active{cursor:grabbing;}
  @keyframes bob{0%,100%{top:34px}50%{top:30px}}
  #petSvg{animation:bob 4s ease-in-out infinite;}
  #app.expanded #petSvg{animation:none; top:14px; width:96px; height:120px;}

  .eyeGroup{transform-box:fill-box; transform-origin:center; animation:blink 4.5s infinite;}
  @keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
  #petSvg.sleep .eyeGroup{animation:none; transform:scaleY(.06);}

  /* 气泡 */
  #bubble{position:absolute; left:50%; top:2px; transform:translateX(-50%) translateY(-8px);
    background:#fff; color:var(--ink); font-size:12px; line-height:1.35; padding:6px 11px; border-radius:14px;
    box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:.25s; max-width:160px; text-align:center; z-index:20;}
  #bubble.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #bubble:after{content:''; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#fff;}

  .fx{position:absolute; font-size:20px; animation:rise 1.2s ease forwards; pointer-events:none; z-index:25;}
  @keyframes rise{from{transform:translateY(0) scale(.8);opacity:1}to{transform:translateY(-60px) scale(1.2);opacity:0}}

  /* 展开面板（菜单 / 设置） */
  #panelWrap{position:absolute; left:10px; right:10px; top:150px; display:none; z-index:30;}
  #app.expanded #panelWrap{display:block;}
  .pp{display:none;}
  .pp.show{display:block;}
  .card{background:rgba(255,255,255,.94); border-radius:18px; padding:14px; box-shadow:var(--shadow);}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
  .mbtn{display:flex; flex-direction:column; align-items:center; gap:4px; background:#fff; border:none;
    border-radius:14px; padding:11px 6px; cursor:pointer; font-size:12px; color:var(--ink);
    box-shadow:0 2px 6px rgba(0,0,0,.08); transition:transform .12s; -webkit-app-region:no-drag;}
  .mbtn:hover{transform:translateY(-3px);}
  .mbtn .ic{font-size:24px;}
  .row{display:flex; align-items:center; gap:8px; margin:10px 0; font-size:12px; color:var(--ink); -webkit-app-region:no-drag;}
  .row input[type=range]{flex:1;}
  .row label{flex:1;}
  .bigbtn{display:block; width:100%; margin:6px 0; padding:10px; border:none; border-radius:14px;
    background:var(--blue); color:#fff; font-size:13px; cursor:pointer; -webkit-app-region:no-drag;}
  .bigbtn.alt{background:var(--gold); color:#5a4500;}
  .bigbtn.ghost{background:rgba(0,0,0,.06); color:var(--ink);}
  .hint{font-size:11px; color:#a98; text-align:center; margin-top:6px;}
  .x{position:absolute; top:8px; right:8px; cursor:pointer; font-size:18px; color:#fff; background:var(--pink);
    border-radius:50%; width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,.15); -webkit-app-region:no-drag;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <!-- 纯人物 SVG（柯南 Q 版），无背景 -->
    <svg id="petSvg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <!-- 后发 -->
      <path d="M48 100 Q50 42 100 40 Q150 42 152 100 Q160 130 148 158 L52 158 Q40 130 48 100 Z" fill="#2b2b3a"/>
      <!-- 脸 -->
      <ellipse cx="100" cy="102" rx="50" ry="48" fill="#ffe0c2"/>
      <!-- 刘海 -->
      <path d="M52 96 Q55 52 100 50 Q145 52 148 96 Q138 74 120 70 Q128 84 118 88 Q108 66 100 72 Q92 62 84 74 Q72 70 80 88 Q66 82 60 96 Q56 100 52 96 Z" fill="#2b2b3a"/>
      <!-- 呆毛 -->
      <path d="M100 50 Q98 30 110 24 Q103 38 100 50 Z" fill="#2b2b3a"/>
      <!-- 眼镜 -->
      <g stroke="#3a3a4a" stroke-width="3" fill="rgba(255,255,255,0.12)">
        <circle cx="80" cy="100" r="17"/>
        <circle cx="120" cy="100" r="17"/>
        <line x1="97" y1="100" x2="103" y2="100"/>
      </g>
      <!-- 眼睛（含瞳孔，瞳孔随鼠标移动） -->
      <g class="eyeGroup" id="egL">
        <ellipse cx="80" cy="100" rx="12" ry="14" fill="#fff"/>
        <g id="pupilL"><circle cx="80" cy="102" r="6.5" fill="#23233a"/><circle cx="82.5" cy="98.5" r="2" fill="#fff"/></g>
      </g>
      <g class="eyeGroup" id="egR">
        <ellipse cx="120" cy="100" rx="12" ry="14" fill="#fff"/>
        <g id="pupilR"><circle cx="120" cy="102" r="6.5" fill="#23233a"/><circle cx="122.5" cy="98.5" r="2" fill="#fff"/></g>
      </g>
      <!-- 眉毛 -->
      <path id="browL" d="M66 80 Q80 76 94 80" stroke="#2b2b3a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path id="browR" d="M106 80 Q120 76 134 80" stroke="#2b2b3a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- 腮红 -->
      <ellipse id="blushL" cx="64" cy="120" rx="9" ry="5" fill="#ff9aa8" opacity="0"/>
      <ellipse id="blushR" cx="136" cy="120" rx="9" ry="5" fill="#ff9aa8" opacity="0"/>
      <!-- 嘴 -->
      <path id="mouth" d="M88 124 Q100 134 112 124" stroke="#b5654a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- 身体（蓝西装 + 白衬衫 + 红领带） -->
      <path d="M60 152 Q100 140 140 152 L152 240 L48 240 Z" fill="#2b3a67"/>
      <path d="M88 152 L100 178 L112 152 Z" fill="#fff"/>
      <path d="M100 154 L93 163 L100 206 L107 163 Z" fill="#d23b3b"/>
      <path d="M60 160 Q42 184 50 212" stroke="#2b3a67" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path d="M140 160 Q158 184 150 212" stroke="#2b3a67" stroke-width="14" fill="none" stroke-linecap="round"/>
    </svg>

    <div id="bubble"></div>

    <!-- 面板：菜单 / 设置（展开时显示） -->
    <div id="panelWrap">
      <div id="menuPanel" class="pp card show">
        <div class="grid">
          <button class="mbtn" onclick="doPet()"><span class="ic">🤚</span>摸摸</button>
          <button class="mbtn" onclick="doWater()"><span class="ic">💧</span>喂水</button>
          <button class="mbtn" onclick="openSettings()"><span class="ic">⚙️</span>设置</button>
          <button class="mbtn" onclick="hidePet()"><span class="ic">👋</span>收起</button>
        </div>
        <p class="hint">拖动小柯可移动 · 双击隐藏</p>
      </div>

      <div id="setPanel" class="pp card">
        <span class="x" onclick="backMenu()">×</span>
        <h3 style="margin:0 0 8px;font-size:14px;color:var(--ink)">⚙️ 设置</h3>
        <div class="row"><label>透明度</label><input type="range" id="setOp" min="40" max="100" value="100" oninput="applyOpacity(this.value)"></div>
        <div class="row"><label>大小</label><input type="range" id="setScale" min="70" max="140" value="100" oninput="applyScale(this.value)"></div>
        <div class="row"><label>🔊 音效</label><input type="checkbox" id="setMute" onchange="toggleMute(this.checked)"></div>
        <div class="row"><label>🚀 开机自启</label><input type="checkbox" id="setAuto" onchange="toggleAuto(this.checked)"></div>
        <button class="bigbtn ghost" onclick="hidePet()">👋 隐藏到托盘</button>
        <p class="hint">v6.0 · 纯人物陪伴 · 眼神随鼠标 · 按时提醒</p>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const SAVE_KEY = 'xiaoke_v6';
const svg = $('#petSvg');

/* ---------- 存档（仅设置 + 亲密度） ---------- */
function defaultState(){
  return { affection:0, settings:{opacity:100,scale:100,mute:false,autostart:true}, lastSeen:Date.now() };
}
function load(){
  try{ const r=JSON.parse(localStorage.getItem(SAVE_KEY)); if(r&&r.settings) return Object.assign(defaultState(),r); }catch(e){}
  return defaultState();
}
function save(){ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
let state = load();

/* ---------- 音效 ---------- */
let actx=null;
function beep(freq,dur,type,vol){
  if(state.settings.mute) return;
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq; g.gain.value=vol||0.18;
    o.connect(g); g.connect(actx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+(dur||0.08));
    o.stop(actx.currentTime+(dur||0.08));
  }catch(e){}
}
function sndHappy(){beep(660,0.08); setTimeout(()=>beep(990,0.1),80);}
function sndClick(){beep(520,0.05,'square',0.12);}

/* ---------- 表情 ---------- */
function setExpression(n){
  const mouth=$('#mouth'), bl=$('#blushL'), br=$('#blushR'), bL=$('#browL'), bR=$('#browR');
  bl.setAttribute('opacity',0); br.setAttribute('opacity',0);
  bL.setAttribute('d','M66 80 Q80 76 94 80'); bR.setAttribute('d','M106 80 Q120 76 134 80');
  if(n==='happy'){ mouth.setAttribute('d','M82 122 Q100 144 118 122'); mouth.setAttribute('fill','#b5654a'); mouth.setAttribute('stroke','none'); bl.setAttribute('opacity',.9); br.setAttribute('opacity',.9); }
  else if(n==='love'){ mouth.setAttribute('d','M92 128 Q100 136 108 128'); mouth.setAttribute('fill','#b5654a'); mouth.setAttribute('stroke','none'); bl.setAttribute('opacity',1); br.setAttribute('opacity',1); }
  else if(n==='sad'){ mouth.setAttribute('d','M86 130 Q100 118 114 130'); mouth.setAttribute('stroke','#b5654a'); mouth.setAttribute('fill','none'); bL.setAttribute('d','M66 82 Q80 86 94 82'); bR.setAttribute('d','M106 82 Q120 86 134 82'); }
  else if(n==='worried'){ mouth.setAttribute('d','M88 126 H112'); mouth.setAttribute('stroke','#b5654a'); mouth.setAttribute('fill','none'); bL.setAttribute('d','M66 78 Q80 74 94 82'); bR.setAttribute('d','M106 82 Q120 74 134 78'); }
  else if(n==='sleep'){ mouth.setAttribute('d','M92 128 Q100 132 108 128'); mouth.setAttribute('stroke','#b5654a'); mouth.setAttribute('fill','none'); }
  else { mouth.setAttribute('d','M88 124 Q100 134 112 124'); mouth.setAttribute('stroke','#b5654a'); mouth.setAttribute('fill','none'); }
  svg.classList.toggle('sleep', n==='sleep');
}

/* ---------- 气泡 / 特效 ---------- */
let lastBubble=0, expTimer=null;
function say(msg, exp, force){
  const now=Date.now();
  if(!force && now-lastBubble < 12000) return;
  lastBubble=now;
  const b=$('#bubble'); b.textContent=msg; b.classList.add('show');
  clearTimeout(say._t); say._t=setTimeout(()=>b.classList.remove('show'), 3400);
  if(exp){ setExpression(exp); clearTimeout(expTimer); expTimer=setTimeout(()=>setExpression('normal'), 3200); }
}
function fx(e){ const f=document.createElement('div'); f.className='fx'; f.textContent=e;
  f.style.left=(55+Math.random()*40)+'px'; f.style.top='120px'; $('#stage').appendChild(f);
  setTimeout(()=>f.remove(),1200); }

/* ---------- 眼神跟随鼠标 ---------- */
const MAX=4.6; // 瞳孔最大偏移（viewBox 单位）
function movePupils(ux,uy){
  if(expanded || svg.classList.contains('sleep')) return;
  $('#pupilL').setAttribute('transform', `translate(${(ux*MAX).toFixed(2)} ${(uy*MAX).toFixed(2)})`);
  $('#pupilR').setAttribute('transform', `translate(${(ux*MAX).toFixed(2)} ${(uy*MAX).toFixed(2)})`);
}
if(window.petAPI && petAPI.onMouseLook){
  petAPI.onMouseLook((ux,uy,mx,my)=>{ movePupils(ux,uy); trackActivity(mx,my); });
}

/* ---------- 时间 + 待机 情感调度 ---------- */
let lastMx=null, lastMy=null, lastMove=Date.now();
let sessionStart=Date.now(), waterBase=Date.now();
let idleSaid=false, idleLongSaid=false, workSaid=false;
let lastHour=new Date().getHours();
let expanded=false;

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function timeGreeting(h){
  if(h>=5&&h<10)  return '早安！新的一天开始啦 ☀️';
  if(h>=10&&h<12) return '上午好呀，加油！';
  if(h>=12&&h<14) return '中午啦，记得吃饭哦 🍱';
  if(h>=14&&h<18) return '下午好，一起努力！';
  if(h>=18&&h<21) return '晚上好，今天辛苦了 🌆';
  if(h>=21&&h<24) return '夜深了，别太累~';
  return '这么晚还不睡？早点休息哦 😴';
}
function trackActivity(mx,my){
  const moved = (mx!==lastMx || my!==lastMy);
  lastMx=mx; lastMy=my;
  if(moved){
    if(idleSaid){ // 刚回到电脑前
      idleSaid=false; idleLongSaid=false; sessionStart=Date.now(); waterBase=Date.now(); workSaid=false;
      say('你来啦~ 我等你好久了','happy',true);
    }
    lastMove=Date.now();
  }
}
function tickEmotional(){
  if(expanded) return;
  const now=Date.now();
  const idle = now - lastMove;
  if(idle > 8000){
    if(!idleSaid){ idleSaid=true; workSaid=false; waterBase=now;
      say(pick(['怎么不理我了…想你了 💭','你去忙什么啦？记得回来陪我~','一个人好孤单…想你了']),'love'); }
    else if(idle > 20*60000 && !idleLongSaid){ idleLongSaid=true; say('我都等你好久了，快回来嘛 🥺','sad'); }
  } else {
    const work = now - sessionStart;
    if(work > 45*60000 && !workSaid){ workSaid=true; say('工作很久了，休息一下吧 ☕','worried'); }
    else if(now - waterBase > 90*60000){ waterBase=now; say('该喝水了 💧 喝点水再继续','normal'); }
    else if(idle < 3000 && Math.random()<0.05){ say(pick(['今天也要元气满满哦','陪我坐会儿嘛','やった！','有你在真好~']),'happy'); }
  }
  // 整点问候
  const h=new Date().getHours();
  if(h!==lastHour){ lastHour=h; say(timeGreeting(h),'normal',true); }
}

/* ---------- 交互 ---------- */
function doPet(){
  state.affection++; save();
  setExpression('happy'); fx('💗'); sndHappy();
  const lines=['嘿嘿~','最喜欢你了','よしよし','摸摸头最舒服了'];
  if(Math.random()<0.6) say(pick(lines),'happy');
}
function doWater(){
  waterBase=Date.now();
  setExpression('happy'); fx('💧'); sndHappy();
  say('咕噜咕噜~ 喝水真舒服','happy');
}
function hidePet(){ if(window.petAPI&&petAPI.hideWindow) petAPI.hideWindow(); }

/* ---------- 面板 ---------- */
function openPanel(which){
  expanded=true;
  $('#app').classList.add('expanded');
  $('#menuPanel').classList.toggle('show', which==='menu');
  $('#setPanel').classList.toggle('show', which==='settings');
  if(window.petAPI&&petAPI.resizeWindow) petAPI.resizeWindow(true);
}
function closePanel(){
  expanded=false;
  $('#app').classList.remove('expanded');
  $('#menuPanel').classList.remove('show'); $('#setPanel').classList.remove('show');
  if(window.petAPI&&petAPI.resizeWindow) petAPI.resizeWindow(false);
}
function toggleMenu(){ if(expanded) closePanel(); else openPanel('menu'); }
function openSettings(){ $('#setOp').value=state.settings.opacity; $('#setScale').value=state.settings.scale; $('#setMute').checked=state.settings.mute;
  if(window.petAPI&&petAPI.getAutoStart) petAPI.getAutoStart().then(v=>{state.settings.autostart=v; $('#setAuto').checked=v;});
  else $('#setAuto').checked=state.settings.autostart; openPanel('settings'); }
function backMenu(){ openPanel('menu'); }
function applyOpacity(v){ state.settings.opacity=+v; if(window.petAPI&&petAPI.setOpacity) petAPI.setOpacity(+v/100); save(); }
function applyScale(v){ state.settings.scale=+v; $('#stage').style.transform='scale('+(+v/100)+')'; save(); }
function toggleMute(c){ state.settings.mute=c; if(!c) sndClick(); save(); }
function toggleAuto(c){ state.settings.autostart=c; if(window.petAPI&&petAPI.setAutoStart) petAPI.setAutoStart(c); save(); }

/* ---------- 拖拽 + 点击 ---------- */
let dragInfo=null, suppressClick=false;
svg.addEventListener('mousedown', e=>{ dragInfo={x:e.clientX,y:e.clientY,t:Date.now()}; if(window.petAPI&&petAPI.dragStart) petAPI.dragStart(); });
window.addEventListener('mouseup', e=>{
  if(!dragInfo) return;
  if(window.petAPI&&petAPI.dragEnd) petAPI.dragEnd();
  const moved=Math.hypot(e.clientX-dragInfo.x, e.clientY-dragInfo.y);
  const dt=Date.now()-dragInfo.t;
  const wasDrag = moved>=6 || dt>=400;
  if(!wasDrag && !suppressClick){ toggleMenu(); }
  suppressClick=false; dragInfo=null;
});
svg.addEventListener('dblclick', ()=>{ suppressClick=true; if(window.petAPI&&petAPI.toggleVisibility) petAPI.toggleVisibility(); });

/* ---------- 初始化 ---------- */
function init(){
  $('#stage').style.transform='scale('+(state.settings.scale/100)+')';
  if(window.petAPI&&petAPI.setOpacity) petAPI.setOpacity((state.settings.opacity||100)/100);
  setExpression('normal');
  setTimeout(()=>say(timeGreeting(new Date().getHours()),'normal',true), 900);
  setInterval(tickEmotional, 5000);
}
init();

window.doPet=doPet; window.doWater=doWater; window.hidePet=hidePet;
window.openSettings=openSettings; window.backMenu=backMenu; window.toggleMenu=toggleMenu;
window.applyOpacity=applyOpacity; window.applyScale=applyScale; window.toggleMute=toggleMute; window.toggleAuto=toggleAuto;
</script>
</body>
</html>
